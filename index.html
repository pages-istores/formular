<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firemní dotazník</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 40px;
    }
    .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .question {
        display: none;
    }
    .question.active {
        display: block;
    }
    button {
        padding: 12px 20px;
        margin-top: 20px;
        background: #0070f3;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background: #0059c1;
    }
    .answers button {
        display: block;
        width: 100%;
        margin: 10px 0;
        background: #eaeaea;
        color: black;
    }
    .answers button:hover {
        background: #d5d5d5;
    }
    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
    }
</style>
</head>

<body>
<div class="container">
    <h2>Firemní dotazník</h2>

    <!-- 1 -->
    <div class="question active" id="q1">
        <h3>1. Co Vaše firma zajišťuje?</h3>
        <div class="answers">
            <button onclick="answer('firma_zajistuje','IT spravu')">IT správu</button>
            <button onclick="answer('firma_zajistuje','Vyvoj aplikaci')">Vývoj aplikací</button>
            <button onclick="answer('firma_zajistuje','Kancelarskou praci')">Kancelářskou práci</button>
            <button onclick="answer('firma_zajistuje','Sluzby')">Služby</button>
        </div>
    </div>

    <!-- 2 -->
    <div class="question" id="q2">
        <h3>2. Jak často spravujete firemní zařízení?</h3>
        <div class="answers">
            <button onclick="answer('sprava_zarizeni','Denne')">Denně</button>
            <button onclick="answer('sprava_zarizeni','Do tydne')">Do týdne</button>
            <button onclick="answer('sprava_zarizeni','Do mesice')">Do měsíce</button>
        </div>
    </div>

    <!-- 3 -->
    <div class="question" id="q3">
        <h3>3. Název společnosti:</h3>
        <input type="text" placeholder="Zadejte název společnosti" oninput="answers.nazev_spolecnosti = this.value">
        <button onclick="nextQuestion()">Pokračovat</button>
    </div>

    <!-- 4 -->
    <div class="question" id="q4">
        <h3>4. Kolik máte současně ve firmě zařízení?</h3>
        <div class="answers">
            <button onclick="answer('pocet_zarizeni','1–10')">1–10</button>
            <button onclick="answer('pocet_zarizeni','11–50')">11–50</button>
            <button onclick="answer('pocet_zarizeni','51–200')">51–200</button>
        </div>
    </div>

    <!-- 5 -->
    <div class="question" id="q5">
        <h3>5. Kolik máte zaměstnanců?</h3>
        <div class="answers">
            <button onclick="answer('pocet_zamestnancu','1–10')">1–10</button>
            <button onclick="answer('pocet_zamestnancu','11–50')">11–50</button>
            <button onclick="answer('pocet_zamestnancu','51–200')">51–200</button>
            <button onclick="answer('pocet_zamestnancu','200+')">200+</button>
        </div>
    </div>

    <!-- 6 -->
    <div class="question" id="q6">
        <h3>6. Vaše jméno:</h3>
        <input type="text" placeholder="Zadejte své jméno" oninput="answers.jmeno = this.value">
        <button onclick="nextQuestion()">Pokračovat</button>
    </div>

    <!-- 7 -->
    <div class="question" id="q7">
        <h3>7. Váš e‑mail:</h3>
        <input type="email" placeholder="Zadejte svůj e‑mail" oninput="answers.email = this.value">
        <button onclick="finish()">Odeslat</button>
    </div>

    <!-- Výsledek -->
    <div class="question" id="result">
        <h3>Děkujeme!</h3>
        <p>Vaše odpovědi byly odeslány.</p>
    </div>
</div>

<script>
let current = 1;
let answers = {};

function answer(key, value) {
    answers[key] = value;
    nextQuestion();
}

function nextQuestion() {
    document.getElementById("q" + current).classList.remove("active");
    current++;
    document.getElementById("q" + current).classList.add("active");
}

function finish() {
    fetch("/api/send-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(answers)
    });

    document.getElementById("q" + current).classList.remove("active");
    document.getElementById("result").classList.add("active");
}
</script>

</body>
</html>
