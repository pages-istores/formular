<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firemní dotazník</title>

<style>
    body {
        font-family: "Inter", Arial, sans-serif;
        background: linear-gradient(135deg, #eef2f7, #d9e2ec);
        margin: 0;
        padding: 40px;
        color: #1f2937;
    }

    .container {
        max-width: 650px;
        margin: auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    .question {
        display: none;
    }

    .question.active {
        display: block;
        animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        font-weight: 700;
    }

    h3 {
        font-size: 20px;
        margin-bottom: 20px;
        font-weight: 600;
    }

    .answers button {
        display: block;
        width: 100%;
        padding: 14px 20px;
        margin: 10px 0;
        background: #f3f4f6;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .answers button:hover {
        background: #e5e7eb;
        border-color: #d1d5db;
    }

    button.main {
        background: #2563eb;
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 17px;
        cursor: pointer;
        width: 100%;
        margin-top: 20px;
        transition: 0.2s;
    }

    button.main:hover {
        background: #1d4ed8;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: 2px solid #e5e7eb;
        font-size: 16px;
        margin-top: 10px;
        transition: 0.2s;
    }

    input:focus {
        border-color: #2563eb;
        outline: none;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    .error {
        color: #b91c1c;
        margin-top: 8px;
        font-size: 14px;
        display: none;
    }

    #companyName {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #f3f4f6;
        font-size: 15px;
        display: none;
    }
</style>
</head>

<body>
<div class="container">
    <h2>Firemní dotazník</h2>

    <!-- 1 – NOVÁ OTÁZKA NA IČO -->
    <div class="question active" id="q1">
        <h3>1. IČO společnosti:</h3>
        <input type="text" id="icoInput" placeholder="Zadejte IČO (8 číslic)">
        <div class="error" id="icoError"></div>
        <div id="companyName"></div>
        <button class="main" onclick="verifyICO()">Pokračovat</button>
    </div>

    <!-- 2 – původní 1 -->
    <div class="question" id="q2">
        <h3>2. Co Vaše firma zajišťuje?</h3>
        <div class="answers">
            <button onclick="answer('firma_zajistuje','IT spravu')">IT správu</button>
            <button onclick="answer('firma_zajistuje','Vyvoj aplikaci')">Vývoj aplikací</button>
            <button onclick="answer('firma_zajistuje','Kancelarskou praci')">Kancelářskou práci</button>
            <button onclick="answer('firma_zajistuje','Sluzby')">Služby</button>
        </div>
    </div>

    <!-- 3 – původní 2 -->
    <div class="question" id="q3">
        <h3>3. Jak často spravujete firemní zařízení?</h3>
        <div class="answers">
            <button onclick="answer('sprava_zarizeni','Denne')">Denně</button>
            <button onclick="answer('sprava_zarizeni','Do tydne')">Do týdne</button>
            <button onclick="answer('sprava_zarizeni','Do mesice')">Do měsíce</button>
        </div>
    </div>

    <!-- 4 – původní 3, ale název společnosti už bereme z IČO, tak jen umožníme přepsat/doplnit -->
    <div class="question" id="q4">
        <h3>4. Název společnosti:</h3>
        <input type="text" id="nazevInput" placeholder="Zadejte název společnosti" oninput="answers.nazev_spolecnosti = this.value">
        <button class="main" onclick="nextQuestion()">Pokračovat</button>
    </div>

    <!-- 5 – původní 4 -->
    <div class="question" id="q5">
        <h3>5. Kolik máte současně ve firmě zařízení?</h3>
        <div class="answers">
            <button onclick="answer('pocet_zarizeni','1–10')">1–10</button>
            <button onclick="answer('pocet_zarizeni','11–50')">11–50</button>
            <button onclick="answer('pocet_zarizeni','51–200')">51–200</button>
        </div>
    </div>

    <!-- 6 – původní 5 -->
    <div class="question" id="q6">
        <h3>6. Kolik máte zaměstnanců?</h3>
        <div class="answers">
            <button onclick="answer('pocet_zamestnancu','1–10')">1–10</button>
            <button onclick="answer('pocet_zamestnancu','11–50')">11–50</button>
            <button onclick="answer('pocet_zamestnancu','51–200')">51–200</button>
            <button onclick="answer('pocet_zamestnancu','200+')">200+</button>
        </div>
    </div>

    <!-- 7 – původní 6 -->
    <div class="question" id="q7">
        <h3>7. Vaše jméno:</h3>
        <input type="text" placeholder="Zadejte své jméno" oninput="answers.jmeno = this.value">
        <button class="main" onclick="nextQuestion()">Pokračovat</button>
    </div>

    <!-- 8 – původní 7 -->
    <div class="question" id="q8">
        <h3>8. Váš e‑mail:</h3>
        <input type="email" placeholder="Zadejte svůj e‑mail" oninput="answers.email = this.value">
        <button class="main" onclick="finish()">Odeslat</button>
    </div>

    <!-- Výsledek -->
    <div class="question" id="result"></div>
</div>

<script>
let current = 1;
let answers = {};

function answer(key, value) {
    answers[key] = value;
    nextQuestion();
}

function nextQuestion() {
    document.getElementById("q" + current).classList.remove("active");
    current++;
    document.getElementById("q" + current).classList.add("active");
}

function evaluate(answers) {
    if (answers.pocet_zamestnancu === "1–10" && answers.pocet_zarizeni === "1–10") return "A";
    if (answers.pocet_zamestnancu === "11–50" || answers.pocet_zarizeni === "11–50") return "B";
    return "C";
}

async function verifyICO() {
    const icoInput = document.getElementById("icoInput");
    const ico = icoInput.value.trim();
    const errorEl = document.getElementById("icoError");
    const companyBox = document.getElementById("companyName");

    errorEl.style.display = "none";
    companyBox.style.display = "none";

    if (!/^[0-9]{8}$/.test(ico)) {
        errorEl.textContent = "IČO musí mít 8 číslic.";
        errorEl.style.display = "block";
        return;
    }

    try {
        // Uprav si URL a hlavičky podle skutečného API justice.cz
        const res = await fetch(`https://www.justice.cz/api/obchodni-rejstrik/${ico}`, {
            headers: {
                "Accept": "application/json",
                "Authorization": "Bearer TVŮJ_API_KLÍČ"
            }
        });

        if (!res.ok) {
            throw new Error("not_found");
        }

        const data = await res.json();

        if (!data || !data.obchodniJmeno) {
            throw new Error("invalid");
        }

        const nazev = data.obchodniJmeno;

        // uložíme do odpovědí
        answers.ico = ico;
        answers.nazev_spolecnosti = nazev;

        // zobrazíme název firmy
        companyBox.textContent = "Nalezená společnost: " + nazev;
        companyBox.style.display = "block";

        // předvyplníme pole v otázce 4, aby šlo případně upravit
        const nazevInput = document.getElementById("nazevInput");
        if (nazevInput) {
            nazevInput.value = nazev;
        }

        // krátká pauza a pokračujeme na další otázku
        setTimeout(() => {
            nextQuestion();
        }, 1200);

    } catch (e) {
        errorEl.textContent = "IČO nebylo nalezeno v obchodním rejstříku.";
        errorEl.style.display = "block";
    }
}

function finish() {
    fetch("/api/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(answers)
    });

    const result = evaluate(answers);

    document.getElementById("q" + current).classList.remove("active");
    const resultBox = document.getElementById("result");
    resultBox.classList.add("active");

    if (result === "A") resultBox.innerHTML = "<h3>Balíček: Apple Business START</h3><p>Balíček je vhodný pro menší tým.</p>";
    if (result === "B") resultBox.innerHTML = "<h3>Balíček: Apple Business READY</h3><p>Balíček je vhodný pro malé a střední firmy.</p>";
    if (result === "C") resultBox.innerHTML = "<h3>Balíček: Apple Business GUARD</h3><p>Bylíček je vhodný pro střední a větší firmy, které preferují zabezpečení.</p>";
}
</script>

</body>
</html>
