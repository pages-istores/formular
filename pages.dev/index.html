<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firemní dotazník</title>

<style>
    body {
        font-family: "Inter", Arial, sans-serif;
        background: linear-gradient(135deg, #eef2f7, #d9e2ec);
        margin: 0;
        padding: 40px;
        color: #1f2937;
    }

    .container {
        max-width: 650px;
        margin: auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 28px;
        font-weight: 700;
        color: #111827;
    }

    .question {
        display: none;
        animation: fadeIn 0.4s ease;
    }

    .question.active {
        display: block;
    }

    h3 {
        font-size: 20px;
        margin-bottom: 20px;
        font-weight: 600;
        color: #111827;
    }

    .answers button {
        display: block;
        width: 100%;
        padding: 14px 20px;
        margin: 10px 0;
        background: #f3f4f6;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .answers button:hover {
        background: #e5e7eb;
        border-color: #d1d5db;
    }

    button.main {
        background: #2563eb;
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 17px;
        cursor: pointer;
        width: 100%;
        margin-top: 20px;
        transition: 0.2s;
    }

    button.main:hover {
        background: #1d4ed8;
    }

    input {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: 2px solid #e5e7eb;
        font-size: 16px;
        margin-top: 10px;
        transition: 0.2s;
    }

    input:focus {
        border-color: #2563eb;
        outline: none;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    #result h3 {
        text-align: center;
        font-size: 24px;
        margin-bottom: 10px;
    }

    #result p {
        text-align: center;
        font-size: 18px;
        color: #4b5563;
    }
</style>
</head>

<body>
<div class="container">
    <h2>Firemní dotazník</h2>

    <!-- 1 -->
    <div class="question active" id="q1">
        <h3>1. Co Vaše firma zajišťuje?</h3>
        <div class="answers">
            <button onclick="answer('firma_zajistuje','IT spravu')">IT správu</button>
            <button onclick="answer('firma_zajistuje','Vyvoj aplikaci')">Vývoj aplikací</button>
            <button onclick="answer('firma_zajistuje','Kancelarskou praci')">Kancelářskou práci</button>
            <button onclick="answer('firma_zajistuje','Sluzby')">Služby</button>
        </div>
    </div>

    <!-- 2 -->
    <div class="question" id="q2">
        <h3>2. Jak často spravujete firemní zařízení?</h3>
        <div class="answers">
            <button onclick="answer('sprava_zarizeni','Denne')">Denně</button>
            <button onclick="answer('sprava_zarizeni','Do tydne')">Do týdne</button>
            <button onclick="answer('sprava_zarizeni','Do mesice')">Do měsíce</button>
        </div>
    </div>

    <!-- 3 -->
    <div class="question" id="q3">
        <h3>3. Název společnosti:</h3>
        <input type="text" placeholder="Zadejte název společnosti" oninput="answers.nazev_spolecnosti = this.value">
        <button class="main" onclick="nextQuestion()">Pokračovat</button>
    </div>

    <!-- 4 -->
    <div class="question" id="q4">
        <h3>4. Kolik máte současně ve firmě zařízení?</h3>
        <div class="answers">
            <button onclick="answer('pocet_zarizeni','1–10')">1–10</button>
            <button onclick="answer('pocet_zarizeni','11–50')">11–50</button>
            <button onclick="answer('pocet_zarizeni','51–200')">51–200</button>
        </div>
    </div>

    <!-- 5 -->
    <div class="question" id="q5">
        <h3>5. Kolik máte zaměstnanců?</h3>
        <div class="answers">
            <button onclick="answer('pocet_zamestnancu','1–10')">1–10</button>
            <button onclick="answer('pocet_zamestnancu','11–50')">11–50</button>
            <button onclick="answer('pocet_zamestnancu','51–200')">51–200</button>
            <button onclick="answer('pocet_zamestnancu','200+')">200+</button>
        </div>
    </div>

    <!-- 6 -->
    <div class="question" id="q6">
        <h3>6. Vaše jméno:</h3>
        <input type="text" placeholder="Zadejte své jméno" oninput="answers.jmeno = this.value">
        <button class="main" onclick="nextQuestion()">Pokračovat</button>
    </div>

    <!-- 7 -->
    <div class="question" id="q7">
        <h3>7. Váš e‑mail:</h3>
        <input type="email" placeholder="Zadejte svůj e‑mail" oninput="answers.email = this.value">
        <button class="main" onclick="finish()">Odeslat</button>
    </div>

    <!-- Výsledek -->
    <div class="question" id="result">
        <h3>Děkujeme!</h3>
        <p>Vaše odpovědi byly úspěšně odeslány.</p>
    </div>
</div>

<script>
let current = 1;
let answers = {};

function answer(key, value) {
    answers[key] = value;
    nextQuestion();
}

function nextQuestion() {
    document.getElementById("q" + current).classList.remove("active");
    current++;
    document.getElementById("q" + current).classList.add("active");
}

function finish() {
    fetch("/api/send-email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(answers)
    });

    document.getElementById("q" + current).classList.remove("active");
    document.getElementById("result").classList.add("active");
}
</script>

</body>
</html>
